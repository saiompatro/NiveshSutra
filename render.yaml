services:
  - type: web
    name: niveshsutra-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: python -m pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-10000}
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MARKET_DATA_CACHE_TTL_SECONDS
        value: "60"
      - key: PUBLIC_APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # Runs the full ML pipeline daily at 15:45 IST (10:15 UTC) after NSE market close.
  # Fetches OHLCV → computes indicators → sentiment → signals → alerts.
  - type: cron
    name: niveshsutra-daily-pipeline
    runtime: python
    plan: free
    rootDir: .
    schedule: "15 10 * * 1-5"
    buildCommand: python -m pip install -r requirements.txt
    startCommand: python scripts/run_daily_pipeline.py --days 365
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
