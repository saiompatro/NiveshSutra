services:
  - type: web
    name: niveshsutra-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r services/api/requirements.txt
    startCommand: uvicorn services.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MARKET_DATA_CACHE_TTL_SECONDS
        value: "60"
      - key: PUBLIC_APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
